<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ReForward Login</title>
  <script>
    (() => {
      const storageKey = "reforward-theme-mode";
      let mode = "system";
      try {
        mode = localStorage.getItem(storageKey) || "system";
      } catch {}
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      const resolved = mode === "system" ? (prefersDark ? "dark" : "light") : mode;
      document.documentElement.dataset.theme = resolved;
      document.documentElement.dataset.themeMode = mode;
    })();
  </script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      color-scheme: light;
      --bg: #f4f4f1;
      --bg-accent: #e7efe8;
      --bg-top: #fafaf8;
      --bg-orb-1: rgba(255, 255, 255, 0.92);
      --bg-orb-2: rgba(11, 102, 214, 0.08);
      --overlay-1: rgba(11, 102, 214, 0.06);
      --overlay-2: rgba(22, 119, 78, 0.06);
      --surface: rgba(255, 255, 255, 0.8);
      --surface-border: rgba(18, 25, 22, 0.08);
      --text: #121916;
      --text-secondary: rgba(18, 25, 22, 0.66);
      --accent: #0b66d6;
      --accent-hover: #177cf0;
      --danger: #b03128;
      --danger-bg: rgba(176, 49, 40, 0.12);
      --danger-border: rgba(176, 49, 40, 0.24);
      --seg-track-bg: rgba(214, 220, 226, 0.92);
      --seg-track-border: rgba(113, 124, 136, 0.18);
      --seg-track-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.74), inset 0 -1px 0 rgba(113, 124, 136, 0.14);
      --seg-thumb-bg: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(232, 237, 242, 0.86));
      --seg-thumb-border: rgba(140, 150, 162, 0.22);
      --seg-thumb-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62), 0 2px 6px rgba(10, 16, 18, 0.14);
      --input-bg: rgba(255, 255, 255, 0.82);
      --input-border: rgba(18, 25, 22, 0.12);
      --input-focus: rgba(11, 102, 214, 0.18);
      --shadow: 0 18px 32px rgba(24, 34, 29, 0.06);
      --radius: 20px;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "Segoe UI", sans-serif;
    }

    :root[data-theme="dark"]{
      color-scheme: dark;
      --bg: #0f1415;
      --bg-accent: #0b1011;
      --bg-top: #14191a;
      --bg-orb-1: rgba(86, 107, 255, 0.16);
      --bg-orb-2: rgba(39, 168, 255, 0.12);
      --overlay-1: rgba(88, 135, 255, 0.14);
      --overlay-2: rgba(50, 190, 140, 0.1);
      --surface: rgba(18, 24, 26, 0.8);
      --surface-border: rgba(255, 255, 255, 0.08);
      --text: #eef4f1;
      --text-secondary: rgba(238, 244, 241, 0.68);
      --accent: #69a8ff;
      --accent-hover: #82b9ff;
      --danger: #ff8c83;
      --danger-bg: rgba(255, 140, 131, 0.14);
      --danger-border: rgba(255, 140, 131, 0.24);
      --seg-track-bg: rgba(36, 44, 47, 0.94);
      --seg-track-border: rgba(255, 255, 255, 0.08);
      --seg-track-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07), inset 0 -1px 0 rgba(0, 0, 0, 0.22);
      --seg-thumb-bg: linear-gradient(180deg, rgba(136, 146, 157, 0.82), rgba(92, 101, 111, 0.58));
      --seg-thumb-border: rgba(255, 255, 255, 0.12);
      --seg-thumb-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 3px 8px rgba(0, 0, 0, 0.32);
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-focus: rgba(105, 168, 255, 0.35);
      --shadow: 0 20px 42px rgba(0, 0, 0, 0.26);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 8% 0%, var(--bg-orb-1), transparent 28%),
        radial-gradient(circle at 85% 16%, var(--bg-orb-2), transparent 28%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg) 48%, var(--bg-accent) 100%);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      padding: 24px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 16% 10%, var(--overlay-1), transparent 22%),
        radial-gradient(circle at 82% 86%, var(--overlay-2), transparent 22%);
    }
    .seg-control{
      position:relative;
      display:inline-grid;
      grid-auto-flow:column;
      align-items:center;
      gap:2px;
      padding:4px;
      border:1px solid var(--seg-track-border);
      border-radius:999px;
      background:var(--seg-track-bg);
      box-shadow:var(--seg-track-shadow),var(--shadow);
      overflow:hidden;
    }

    .seg-control .seg-thumb{
      position:absolute;
      top:0;
      left:0;
      z-index:0;
      width:0;
      height:0;
      border-radius:999px;
      background:var(--seg-thumb-bg);
      border:1px solid var(--seg-thumb-border);
      box-shadow:var(--seg-thumb-shadow);
      pointer-events:none;
      will-change:transform,width,height;
    }

    .seg-control .seg-thumb.ready{
      transition:
        transform .32s cubic-bezier(.22,1,.36,1),
        width .32s cubic-bezier(.22,1,.36,1),
        height .32s cubic-bezier(.22,1,.36,1),
        background .28s ease,
        box-shadow .28s ease;
    }

    .theme-switch{
      position:fixed;
      top:24px;
      right:24px;
      z-index:2;
      backdrop-filter:saturate(180%) blur(20px);
      -webkit-backdrop-filter:saturate(180%) blur(20px);
    }

    .theme-switch .seg-btn{
      position:relative;
      z-index:1;
      width:auto;
      min-width:68px;
      padding:9px 14px;
      border:0;
      border-radius:999px;
      background:transparent;
      color:var(--text-secondary);
      font:600 12px/1 var(--font);
      letter-spacing:.01em;
      transform:none;
      outline:none;
      appearance:none;
      -webkit-appearance:none;
      -webkit-tap-highlight-color:transparent;
      transition:color .18s ease,transform .18s ease;
    }

    .theme-switch .seg-btn:hover{
      transform:translateY(-1px);
    }

    .theme-switch .seg-btn.active{
      color:var(--text);
    }

    .theme-switch:focus-within{
      box-shadow:
        var(--seg-track-shadow),
        var(--shadow),
        0 0 0 3px rgba(11,102,214,.14);
    }

    body,
    body::before,
    .card,
    .seg-control,
    input,
    .footer,
    .subtitle,
    label,
    .error{
      transition:
        background .7s ease,
        background-color .7s ease,
        color .7s ease,
        border-color .7s ease,
        box-shadow .7s ease;
    }

    .card{
      width:min(90vw,420px);
      padding:44px 36px 36px;
      border:1px solid var(--surface-border);
      border-radius:var(--radius);
      background:var(--surface);
      backdrop-filter:saturate(180%) blur(20px);
      -webkit-backdrop-filter:saturate(180%) blur(20px);
      box-shadow:var(--shadow);
      animation:card-in .6s cubic-bezier(.16,1,.3,1) both;
      position:relative;
      z-index:1;
    }

    @keyframes card-in{
      from{opacity:0;transform:translateY(18px) scale(.97)}
    }

    .logo{
      width:40px;height:40px;
      margin-bottom:24px;
      border-radius:10px;
      background:linear-gradient(135deg,var(--accent),#00c7ff);
      display:grid;place-items:center;
      font-size:18px;font-weight:700;color:#fff;
      letter-spacing:-.02em;
    }

    h1{
      font-size:28px;
      font-weight:700;
      letter-spacing:-.02em;
      line-height:1.15;
      margin-bottom:8px;
    }

    .subtitle{
      color:var(--text-secondary);
      font-size:15px;
      line-height:1.6;
      margin-bottom:28px;
    }

    .error{
      padding:12px 16px;
      border-radius:12px;
      background:var(--danger-bg);
      border:1px solid var(--danger-border);
      color:var(--danger);
      font-size:14px;
      line-height:1.5;
      margin-bottom:20px;
      animation:shake .4s ease;
    }

    @keyframes shake{
      10%,90%{transform:translateX(-1px)}
      20%,80%{transform:translateX(2px)}
      30%,50%,70%{transform:translateX(-3px)}
      40%,60%{transform:translateX(3px)}
    }

    form{display:grid;gap:16px}

    label{
      display:grid;
      gap:8px;
      font-size:13px;
      font-weight:500;
      color:var(--text-secondary);
    }

    input{
      width:100%;
      padding:14px 16px;
      border:1px solid var(--input-border);
      border-radius:12px;
      background:var(--input-bg);
      color:var(--text);
      font:16px var(--font);
      outline:none;
      transition:border-color .25s,box-shadow .25s;
    }
    input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--input-focus);
    }
    input::placeholder{color:var(--text-secondary)}

    form button{
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:var(--accent);
      color:#fff;
      font:600 16px var(--font);
      cursor:pointer;
      transition:background .2s,transform .15s;
    }
    form button:hover{background:var(--accent-hover)}
    form button:active{transform:scale(.98)}

    .footer{
      margin-top:28px;
      padding-top:20px;
      border-top:1px solid var(--surface-border);
      font-size:12px;
      color:var(--text-secondary);
      line-height:1.8;
    }
    .footer span{opacity:.5}

    @media (max-width:640px){
      .theme-switch{
        top:16px;
        right:16px;
        left:16px;
        grid-template-columns:repeat(3,minmax(0,1fr));
      }

      .theme-switch .seg-btn{
        min-width:0;
        width:100%;
      }

      .card{
        padding:40px 24px 24px;
      }
    }
  </style>
</head>
  <body>
  <div class="seg-control theme-switch" id="loginThemeSwitch" aria-label="主题切换">
    <span class="seg-thumb" id="loginThemeThumb" aria-hidden="true"></span>
    <button type="button" class="seg-btn" data-theme-mode="light">亮色</button>
    <button type="button" class="seg-btn" data-theme-mode="dark">暗色</button>
    <button type="button" class="seg-btn" data-theme-mode="system">系统</button>
  </div>
  <main class="card">
    <div class="logo">R</div>
    <h1>ReForward</h1>
    <p class="subtitle">默认入口策略和隐藏后台路径都来自首次初始化写入的 D1 配置。只有输入后台密码，才会进入控制台。</p>
    {{ERROR_BLOCK}}
    <form method="post" action="{{BACKEND_BASE_PATH}}/login">
      <label>
        控制台密码
        <input name="password" type="password" autocomplete="current-password" placeholder="请输入密码" required>
      </label>
      <button type="submit">进入控制台</button>
    </form>
    <div class="footer">
      <div><span>●</span> 公开数据：路由保存在 Cloudflare D1</div>
      <div><span>●</span> 后台路径、默认入口策略和密码哈希都保存在 D1</div>
      <div><span>●</span> 后台会话签名会随 Worker 新版本自动轮换</div>
    </div>
  </main>
  <script>
    (() => {
      const storageKey = "reforward-theme-mode";
      const track = document.getElementById("loginThemeSwitch");
      const buttons = Array.from(track?.querySelectorAll("[data-theme-mode]") || []);
      const thumb = document.getElementById("loginThemeThumb");
      const media = window.matchMedia("(prefers-color-scheme: dark)");

      function readMode() {
        try {
          return localStorage.getItem(storageKey) || "system";
        } catch {
          return "system";
        }
      }

      function resolveTheme(mode) {
        return mode === "system" ? (media.matches ? "dark" : "light") : mode;
      }

      function applyTheme(mode, persist = false) {
        if (persist) {
          try {
            localStorage.setItem(storageKey, mode);
          } catch {}
        }
        document.documentElement.dataset.themeMode = mode;
        document.documentElement.dataset.theme = resolveTheme(mode);
        for (const button of buttons) {
          button.classList.toggle("active", button.dataset.themeMode === mode);
        }
        updateThumb();
      }

      function updateThumb() {
        const active = buttons.find(b => b.classList.contains("active"));
        if (!thumb || !active || !track) return;
        const width = active.offsetWidth;
        const height = active.offsetHeight;
        if (!width || !height) {
          requestAnimationFrame(updateThumb);
          return;
        }
        thumb.style.width = width + "px";
        thumb.style.height = height + "px";
        thumb.style.transform = `translate3d(${active.offsetLeft}px, ${active.offsetTop}px, 0)`;
        if (!thumb.classList.contains("ready")) {
          requestAnimationFrame(() => requestAnimationFrame(() => thumb.classList.add("ready")));
        }
      }

      for (const button of buttons) {
        button.addEventListener("click", () => {
          applyTheme(button.dataset.themeMode || "system", true);
        });
      }

      if (typeof media.addEventListener === "function") {
        media.addEventListener("change", () => {
          if ((document.documentElement.dataset.themeMode || "system") === "system") {
            applyTheme("system");
          }
        });
      }

      window.addEventListener("resize", updateThumb);
      window.addEventListener("load", updateThumb);
      window.addEventListener("pageshow", updateThumb);
      if (typeof ResizeObserver === "function" && track) {
        const observer = new ResizeObserver(updateThumb);
        observer.observe(track);
      }

      applyTheme(readMode());
      requestAnimationFrame(updateThumb);
    })();
  </script>
</body>
</html>
